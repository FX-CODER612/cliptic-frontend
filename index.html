<!DOCTYPE html>
<html>
<head>
  <title>Cliptic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Same styles as before – keep them */
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }
    h1 { margin-top: 20px; color: #ff0050; }
    input, button {
      padding: 12px;
      margin: 6px;
      border-radius: 10px;
      border: none;
      width: 90%;
      max-width: 300px;
    }
    button {
      background: linear-gradient(45deg, #ff0050, #ff3c7d);
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    button:disabled { background: gray; }
    video {
      width: 100%;
      max-width: 250px;
      height: 450px;
      object-fit: cover;
      border-radius: 12px;
    }
    .clip {
      display: inline-block;
      margin: 10px;
      background: #1c1c1c;
      padding: 10px;
      border-radius: 12px;
      width: 260px;
    }
    .score { color: #00ffcc; font-weight: bold; }
    .box {
      margin: 15px auto;
      padding: 15px;
      background: #1c1c1c;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
    }
    .btn-secondary { background: #222; }
  </style>
</head>
<body>

<h1>🚀 CLIPTIC</h1>

<div id="userBox" class="box" style="display:none;">
  <p id="userInfo"></p>
  <button onclick="logout()">Logout</button>
</div>

<div id="authBox" class="box">
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password"><br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="uploadBox" class="box" style="display:none;">
  <h2>🎬 Create Clips</h2>
  <input type="file" id="videoFile" accept="video/*" onchange="previewVideo()"><br>
  <video id="preview" controls style="display:none;"></video><br>
  Duration (seconds):
  <input id="duration" type="number" value="10" min="1" max="60"><br>
  <button id="uploadBtn" onclick="upload()">⚡ Generate Clips</button>
  <button id="animBtn" class="btn-secondary" onclick="convertToAnimation()">🎨 Animation</button>
  <p id="status"></p>
</div>

<div id="rechargeBox" class="box" style="display:none;">
  <h2>💳 Upgrade</h2>
  <button onclick="requestRecharge('bank')">Bank Payment</button>
  <button onclick="requestRecharge('crypto')">Crypto Payment</button>
  <p id="paymentStatus"></p>
</div>

<h2>🔥 Your Clips</h2>
<div id="clips"></div>

<script>
// 🔧 CHANGE THIS TO YOUR RENDER BACKEND URL AFTER DEPLOYMENT
const API = "https://clipitic-backend-2.onrender.com"; // <-- UPDATE ME

let token = localStorage.getItem("token") || "";

// DOM elements
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const videoFile = document.getElementById("videoFile");
const durationInput = document.getElementById("duration");
const status = document.getElementById("status");
const clips = document.getElementById("clips");
const uploadBtn = document.getElementById("uploadBtn");
const animBtn = document.getElementById("animBtn");
const preview = document.getElementById("preview");
const userInfo = document.getElementById("userInfo");
const paymentStatus = document.getElementById("paymentStatus");
const authBox = document.getElementById("authBox");
const uploadBox = document.getElementById("uploadBox");
const userBox = document.getElementById("userBox");
const rechargeBox = document.getElementById("rechargeBox");

// Wake up server on load
async function wakeServer() {
  try { await fetch(API); } catch {}
}
setInterval(() => fetch(API).catch(() => {}), 5 * 60 * 1000);

window.onload = async () => {
  await wakeServer();
  if (token) {
    showApp();
    loadUser();
    loadClips();
  }
};

async function safeFetch(url, options = {}) {
  let retries = 5;
  while (retries > 0) {
    try {
      const res = await fetch(url, options);
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || `Request failed (${res.status})`);
      }
      return await res.json();
    } catch (err) {
      retries--;
      status.innerText = `⏳ Connecting... (${retries} retries left)`;
      await new Promise(r => setTimeout(r, 3000));
    }
  }
  throw new Error("⚠️ Server still waking up. Please try again in a moment.");
}

async function register() {
  try {
    const data = await safeFetch(API + '/register', {
      method: 'POST',
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: emailInput.value, password: passwordInput.value })
    });
    alert(data.message);
  } catch (err) {
    alert(err.message);
  }
}

async function login() {
  try {
    status.innerText = "⏳ Logging in...";
    const data = await safeFetch(API + '/login', {
      method: 'POST',
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: emailInput.value, password: passwordInput.value })
    });
    token = data.token;
    localStorage.setItem("token", token);
    showApp();
    loadUser();
    loadClips();
    status.innerText = "";
  } catch (err) {
    alert(err.message);
    status.innerText = "";
  }
}

function logout() {
  localStorage.removeItem("token");
  location.reload();
}

function showApp() {
  authBox.style.display = "none";
  uploadBox.style.display = "block";
  userBox.style.display = "block";
  rechargeBox.style.display = "block";
}

async function loadUser() {
  try {
    const user = await safeFetch(API + '/me', {
      headers: { Authorization: "Bearer " + token }
    });
    userInfo.innerHTML = `
      📧 ${user.email}<br>
      💰 Credits: ${user.credits}<br>
      🚀 Plan: ${user.plan}
    `;
  } catch {
    logout();
  }
}

function previewVideo() {
  const file = videoFile.files[0];
  if (!file) return;
  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";
}

async function upload() {
  try {
    const file = videoFile.files[0];
    if (!file) return alert("Select a video");
    uploadBtn.disabled = true;
    status.innerText = "Processing video...";
    const formData = new FormData();
    formData.append('video', file);
    formData.append('duration', durationInput.value);
    await safeFetch(API + '/auto-cut', {
      method: 'POST',
      headers: { Authorization: "Bearer " + token },
      body: formData
    });
    status.innerText = "✅ Clip created!";
    loadUser();
    loadClips();
  } catch (err) {
    status.innerText = "❌ " + err.message;
  } finally {
    uploadBtn.disabled = false;
  }
}

async function convertToAnimation() {
  try {
    const file = videoFile.files[0];
    if (!file) return alert("Select a video");
    animBtn.disabled = true;
    status.innerText = "Converting to animation...";
    const formData = new FormData();
    formData.append('video', file);
    await safeFetch(API + '/video-to-animation', {
      method: 'POST',
      headers: { Authorization: "Bearer " + token },
      body: formData
    });
    status.innerText = "✅ Animation created!";
    loadClips();
    loadUser();
  } catch (err) {
    status.innerText = "❌ " + err.message;
  } finally {
    animBtn.disabled = false;
  }
}

async function loadClips() {
  try {
    const data = await safeFetch(API + '/my-clips', {
      headers: { Authorization: "Bearer " + token }
    });
    clips.innerHTML = "";
    data.forEach(c => {
      clips.innerHTML += `
        <div class="clip">
          <video src="${c.file}" controls></video>
          <p class="score">🔥 Score: ${c.score}</p>
        </div>
      `;
    });
  } catch (err) {
    console.error(err);
  }
}

async function requestRecharge(type) {
  try {
    paymentStatus.innerText = "Submitting request...";
    await safeFetch(API + '/request-recharge', {
      method: 'POST',
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({ type })
    });
    paymentStatus.innerText = "✅ Request sent! Admin will review.";
  } catch (err) {
    paymentStatus.innerText = "❌ " + err.message;
  }
}
</script>

</body>
</html>

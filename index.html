<!DOCTYPE html>
<html>
<head>
  <title>Cliptic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    h1 { margin-top: 20px; color: #ff0050; }

    input, button {
      padding: 12px;
      margin: 6px;
      border-radius: 10px;
      border: none;
      width: 90%;
      max-width: 300px;
    }

    button {
      background: linear-gradient(45deg, #ff0050, #ff3c7d);
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:disabled { background: gray; }

    video {
      width: 100%;
      max-width: 250px;
      height: 450px;
      object-fit: cover;
      border-radius: 12px;
    }

    .clip {
      display: inline-block;
      margin: 10px;
      background: #1c1c1c;
      padding: 10px;
      border-radius: 12px;
      width: 260px;
    }

    .score { color: #00ffcc; font-weight: bold; }

    .box {
      margin: 15px auto;
      padding: 15px;
      background: #1c1c1c;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
    }

    .btn-secondary { background: #222; }
  </style>
</head>

<body>

<h1>🚀 CLIPTIC</h1>

<div id="userBox" class="box" style="display:none;">
  <p id="userInfo"></p>
  <button onclick="logout()">Logout</button>
</div>

<div id="authBox" class="box">
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password"><br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="uploadBox" class="box" style="display:none;">
  <h2>🎬 Create Clips</h2>

  <input type="file" id="videoFile" onchange="previewVideo()"><br>

  <video id="preview" controls style="display:none;"></video>

  <br>
  Duration:
  <input id="duration" value="10"><br>

  <button id="uploadBtn" onclick="upload()">⚡ Generate Clips</button>
  <button id="animBtn" class="btn-secondary" onclick="convertToAnimation()">🎨 Animation</button>

  <p id="status"></p>
</div>

<div id="rechargeBox" class="box" style="display:none;">
  <h2>💳 Upgrade</h2>

  <button onclick="requestRecharge('bank')">Bank Payment</button>
  <button onclick="requestRecharge('crypto')">Crypto Payment</button>

  <p id="paymentStatus"></p>
</div>

<h2>🔥 Your Clips</h2>
<div id="clips"></div>

<script>
const API = "https://cliptic-backend.onrender.com";

let token = localStorage.getItem("token") || "";

// ELEMENTS
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const videoFile = document.getElementById("videoFile");
const durationInput = document.getElementById("duration");
const status = document.getElementById("status");
const clips = document.getElementById("clips");
const uploadBtn = document.getElementById("uploadBtn");
const animBtn = document.getElementById("animBtn");
const preview = document.getElementById("preview");
const userInfo = document.getElementById("userInfo");
const paymentStatus = document.getElementById("paymentStatus");

// 🚀 WAKE SERVER STRONG
async function wakeServer() {
  try {
    await fetch(API);
  } catch {}
}

// 🔥 KEEP SERVER ALIVE (every 5 mins)
setInterval(() => {
  fetch(API).catch(() => {});
}, 5 * 60 * 1000);

// INIT
window.onload = async () => {
  await wakeServer();

  if (token) {
    showApp();
    loadUser();
    loadClips();
  }
};

// 🔥 STRONG SAFE FETCH (handles Render delay)
async function safeFetch(url, options = {}) {
  let retries = 5;

  while (retries > 0) {
    try {
      const res = await fetch(url, options);

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || "Server issue");
      }

      return await res.json();

    } catch (err) {
      retries--;

      status.innerText = "⏳ Connecting to server...";

      await new Promise(r => setTimeout(r, 3000));
    }
  }

  throw new Error("⚠️ Server still waking up. Try again.");
}

// AUTH
async function register() {
  try {
    const data = await safeFetch(API + '/register', {
      method: 'POST',
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: emailInput.value,
        password: passwordInput.value
      })
    });

    alert(data.message);
  } catch (err) {
    alert(err.message);
  }
}

async function login() {
  try {
    alert("⏳ Connecting... please wait");

    const data = await safeFetch(API + '/login', {
      method: 'POST',
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: emailInput.value,
        password: passwordInput.value
      })
    });

    token = data.token;
    localStorage.setItem("token", token);

    showApp();
    loadUser();
    loadClips();

  } catch (err) {
    alert(err.message);
  }
}

function logout() {
  localStorage.removeItem("token");
  location.reload();
}

// UI
function showApp() {
  authBox.style.display = "none";
  uploadBox.style.display = "block";
  userBox.style.display = "block";
  rechargeBox.style.display = "block";
}

// USER
async function loadUser() {
  try {
    const user = await safeFetch(API + '/me', {
      headers: { Authorization: "Bearer " + token }
    });

    userInfo.innerHTML = `
      📧 ${user.email}<br>
      💰 Credits: ${user.credits}<br>
      🚀 Plan: ${user.plan}
    `;
  } catch {
    logout();
  }
}

// VIDEO PREVIEW
function previewVideo() {
  const file = videoFile.files[0];
  if (!file) return;

  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";
}

// UPLOAD
async function upload() {
  try {
    const file = videoFile.files[0];
    if (!file) return alert("Select video");

    uploadBtn.disabled = true;
    status.innerText = "Processing...";

    const formData = new FormData();
    formData.append('video', file);
    formData.append('duration', durationInput.value);

    await safeFetch(API + '/auto-cut', {
      method: 'POST',
      headers: { Authorization: "Bearer " + token },
      body: formData
    });

    status.innerText = "Done!";
    loadUser();
    loadClips();

  } catch (err) {
    status.innerText = err.message;
  } finally {
    uploadBtn.disabled = false;
  }
}

// ANIMATION
async function convertToAnimation() {
  try {
    const file = videoFile.files[0];
    if (!file) return alert("Select video");

    animBtn.disabled = true;
    status.innerText = "Processing...";

    const formData = new FormData();
    formData.append('video', file);

    await safeFetch(API + '/video-to-animation', {
      method: 'POST',
      headers: { Authorization: "Bearer " + token },
      body: formData
    });

    status.innerText = "Done!";
    loadClips();

  } catch (err) {
    status.innerText = err.message;
  } finally {
    animBtn.disabled = false;
  }
}

// LOAD CLIPS
async function loadClips() {
  try {
    const data = await safeFetch(API + '/my-clips', {
      headers: { Authorization: "Bearer " + token }
    });

    clips.innerHTML = "";

    data.forEach(c => {
      clips.innerHTML += `
        <div class="clip">
          <video src="${c.file}" controls></video>
          <p class="score">🔥 Score: ${c.score}</p>
        </div>
      `;
    });

  } catch (err) {
    console.log(err.message);
  }
}

// RECHARGE
async function requestRecharge(type) {
  try {
    paymentStatus.innerText = "Submitting...";

    await safeFetch(API + '/request-recharge', {
      method: 'POST',
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({ type })
    });

    paymentStatus.innerText = "Waiting for approval";

  } catch (err) {
    paymentStatus.innerText = err.message;
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Cliptic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    h1 { margin-top: 20px; color: #ff0050; }

    input, button {
      padding: 12px;
      margin: 6px;
      border-radius: 10px;
      border: none;
      width: 90%;
      max-width: 300px;
    }

    button {
      background: linear-gradient(45deg, #ff0050, #ff3c7d);
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:disabled { background: gray; }

    video {
      width: 100%;
      max-width: 250px;
      height: 450px;
      object-fit: cover;
      border-radius: 12px;
    }

    .clip {
      display: inline-block;
      margin: 10px;
      background: #1c1c1c;
      padding: 10px;
      border-radius: 12px;
      width: 260px;
    }

    .score { color: #00ffcc; font-weight: bold; }

    .box {
      margin: 15px auto;
      padding: 15px;
      background: #1c1c1c;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
    }

    .pro { color: gold; }
    .free { color: #ccc; }
    .low { color: red; }

    .btn-secondary { background: #222; }
    .preview { margin-top: 10px; }

    .wallet {
      word-break: break-all;
      background: #111;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h1>🚀 CLIPTIC</h1>

<div id="userBox" class="box" style="display:none;">
  <p id="userInfo"></p>
  <button onclick="logout()">Logout</button>
</div>

<div id="authBox" class="box">
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password"><br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="uploadBox" class="box" style="display:none;">
  <h2>🎬 Create Clips</h2>

  <input type="file" id="videoFile" onchange="previewVideo()"><br>

  <video id="preview" class="preview" controls style="display:none;"></video>

  <br>
  Duration:
  <input id="duration" value="10"><br>

  <button id="uploadBtn" onclick="upload()">⚡ Generate Clips</button>
  <button id="animBtn" class="btn-secondary" onclick="convertToAnimation()">🎨 Animation</button>

  <p id="status"></p>
</div>

<div id="rechargeBox" class="box" style="display:none;">
  <h2>💳 Upgrade to Pro</h2>

  <p>Free: Limited credits</p>
  <p class="pro">Pro: Unlimited power ⚡</p>

  <hr>

  <h3>🏦 Bank Transfer</h3>
  <p>OPay:<br>8061980928<br>Emmanuel Adamu</p>
  <button onclick="requestRecharge('bank')">I Paid via Bank</button>

  <hr>

  <h3>🪙 Crypto (USDT - BNB)</h3>
  <div class="wallet" id="wallet">
    0x1F74A8DaA15C55471055B692c64d25511678Ab3f
  </div>

  <button onclick="copyWallet()">📋 Copy Address</button>
  <button onclick="requestRecharge('crypto')">I Paid via Crypto</button>

  <p id="paymentStatus"></p>
</div>

<h2>🔥 Your Clips</h2>
<div id="clips"></div>

<script>
const API = "https://cliptic-backend.onrender.com";

let token = localStorage.getItem("token") || "";

window.onload = () => {
  if (token) {
    showApp();
    loadUser();
    loadClips();
  }
};

async function handleResponse(res) {
  const data = await res.json();
  if (!res.ok) {
    throw new Error(data.error || "Something went wrong");
  }
  return data;
}

async function register() {
  try {
    const res = await fetch(API + '/register', {
      method: 'POST',
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email.value, password: password.value })
    });

    const data = await handleResponse(res);
    alert(data.message);
  } catch (err) {
    alert(err.message);
  }
}

async function login() {
  try {
    const res = await fetch(API + '/login', {
      method: 'POST',
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email.value, password: password.value })
    });

    const data = await handleResponse(res);

    token = data.token;
    localStorage.setItem("token", token);

    showApp();
    loadUser();
    loadClips();
  } catch (err) {
    alert(err.message);
  }
}

function logout() {
  localStorage.removeItem("token");
  location.reload();
}

function showApp() {
  authBox.style.display = "none";
  uploadBox.style.display = "block";
  userBox.style.display = "block";
  rechargeBox.style.display = "block";
}

async function loadUser() {
  try {
    const res = await fetch(API + '/me', {
      headers: { Authorization: "Bearer " + token }
    });

    const user = await handleResponse(res);

    userInfo.innerHTML = `
      📧 ${user.email}<br>
      💰 Credits: <b>${user.credits}</b><br>
      🚀 Plan: ${user.plan.toUpperCase()}
    `;
  } catch {
    logout();
  }
}

function previewVideo() {
  const file = videoFile.files[0];
  if (!file) return;

  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";
}

async function upload() {
  try {
    const file = videoFile.files[0];
    if (!file) return alert("Select a video");

    uploadBtn.disabled = true;
    status.innerText = "Processing... ⏳";

    const formData = new FormData();
    formData.append('video', file);
    formData.append('duration', durationInput.value);

    const res = await fetch(API + '/auto-cut', {
      method: 'POST',
      headers: { Authorization: "Bearer " + token },
      body: formData
    });

    await handleResponse(res);

    status.innerText = "Done ✅";
    loadUser();
    loadClips();
  } catch (err) {
    status.innerText = err.message;
  } finally {
    uploadBtn.disabled = false;
  }
}

async function convertToAnimation() {
  try {
    const file = videoFile.files[0];
    if (!file) return alert("Select video");

    animBtn.disabled = true;
    status.innerText = "Processing animation... 🎨";

    const formData = new FormData();
    formData.append('video', file);

    const res = await fetch(API + '/video-to-animation', {
      method: 'POST',
      headers: { Authorization: "Bearer " + token },
      body: formData
    });

    await handleResponse(res);

    status.innerText = "Done ✅";
    loadClips();
  } catch (err) {
    status.innerText = err.message;
  } finally {
    animBtn.disabled = false;
  }
}

async function loadClips() {
  try {
    const res = await fetch(API + '/my-clips', {
      headers: { Authorization: "Bearer " + token }
    });

    const clipsData = await handleResponse(res);

    clips.innerHTML = "";
    clipsData.forEach(c => {
      clips.innerHTML += `
        <div class="clip">
          <video src="${c.file}" controls></video>
          <p class="score">🔥 Score: ${c.score}</p>
          <button onclick="download('${c.file}')">Download</button>
        </div>
      `;
    });
  } catch (err) {
    console.log(err.message);
  }
}

function download(url) {
  const a = document.createElement("a");
  a.href = url;
  a.download = "video.mp4";
  a.click();
}

function copyWallet() {
  navigator.clipboard.writeText(wallet.innerText);
  alert("Wallet copied!");
}

async function requestRecharge(type) {
  try {
    paymentStatus.innerText = "Submitting... ⏳";

    const res = await fetch(API + '/request-recharge', {
      method: 'POST',
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({ type })
    });

    await handleResponse(res);
    paymentStatus.innerText = "Waiting for admin approval ⏳";
  } catch (err) {
    paymentStatus.innerText = err.message;
  }
}

const videoFile = document.getElementById("videoFile");
const durationInput = document.getElementById("duration");
const status = document.getElementById("status");
const clips = document.getElementById("clips");
const uploadBtn = document.getElementById("uploadBtn");
const animBtn = document.getElementById("animBtn");
const preview = document.getElementById("preview");
</script>

</body>
</html>
